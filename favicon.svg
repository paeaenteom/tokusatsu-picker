<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <filter id="metalTex" x="0%" y="0%" width="100%" height="100%">
      <feTurbulence type="fractalNoise" baseFrequency="0.8 0.05" numOctaves="3" seed="2" result="n"/>
      <feColorMatrix type="saturate" values="0" in="n" result="g"/>
      <feBlend in="SourceGraphic" in2="g" mode="overlay" result="t"/>
      <feComposite in="t" in2="SourceGraphic" operator="in"/>
    </filter>
    <filter id="paintTex" x="0%" y="0%" width="100%" height="100%">
      <feTurbulence type="fractalNoise" baseFrequency="1.2" numOctaves="5" seed="8" result="n"/>
      <feColorMatrix type="saturate" values="0" in="n" result="g"/>
      <feBlend in="SourceGraphic" in2="g" mode="soft-light" result="p"/>
      <feComposite in="p" in2="SourceGraphic" operator="in"/>
    </filter>
    <filter id="glassFx" x="-10%" y="-10%" width="120%" height="120%">
      <feTurbulence type="turbulence" baseFrequency="0.025" numOctaves="3" seed="5" result="w"/>
      <feDisplacementMap in="SourceGraphic" in2="w" scale="1.2" xChannelSelector="R" yChannelSelector="G" result="r"/>
      <feSpecularLighting in="w" surfaceScale="2.5" specularConstant="1" specularExponent="35" lighting-color="#fff" result="s">
        <fePointLight x="22" y="8" z="45"/>
      </feSpecularLighting>
      <feComposite in="s" in2="SourceGraphic" operator="in" result="sc"/>
      <feBlend in="r" in2="sc" mode="screen"/>
    </filter>
    <filter id="plasticSheen" x="-10%" y="-10%" width="120%" height="120%">
      <feSpecularLighting in="SourceAlpha" surfaceScale="4" specularConstant="0.8" specularExponent="22" lighting-color="#fff" result="s">
        <fePointLight x="18" y="6" z="32"/>
      </feSpecularLighting>
      <feComposite in="s" in2="SourceAlpha" operator="in" result="sc"/>
      <feBlend in="SourceGraphic" in2="sc" mode="screen"/>
    </filter>
    <filter id="goldSpec" x="-20%" y="-20%" width="140%" height="140%">
      <feSpecularLighting in="SourceAlpha" surfaceScale="5" specularConstant="1.5" specularExponent="25" lighting-color="#FFE888" result="s">
        <fePointLight x="38" y="38" z="25"/>
      </feSpecularLighting>
      <feComposite in="s" in2="SourceAlpha" operator="in" result="sc"/>
      <feBlend in="SourceGraphic" in2="sc" mode="screen"/>
    </filter>
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="1.5" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="ambientGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="5"/>
    </filter>
    <!-- Inset recess shadow -->
    <filter id="insetShadow" x="-10%" y="-10%" width="120%" height="120%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="1.2" result="blur"/>
      <feOffset dx="0" dy="0.8" result="off"/>
      <feFlood flood-color="#000" flood-opacity="0.5" result="color"/>
      <feComposite in="color" in2="off" operator="in" result="shadow"/>
      <feMerge><feMergeNode in="shadow"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>

    <radialGradient id="bgR" cx="50%" cy="40%" r="60%"><stop offset="0%" stop-color="#151525"/><stop offset="100%" stop-color="#070710"/></radialGradient>
    <radialGradient id="domeG" cx="35%" cy="28%" r="65%"><stop offset="0%" stop-color="rgba(255,255,255,0.2)"/><stop offset="40%" stop-color="rgba(255,255,255,0.07)"/><stop offset="100%" stop-color="rgba(255,255,255,0.02)"/></radialGradient>
    <linearGradient id="bodyL" x1="0%" y1="0%" x2="100%" y2="0%"><stop offset="0%" stop-color="#A81828"/><stop offset="12%" stop-color="#D82040"/><stop offset="50%" stop-color="#E83850"/><stop offset="88%" stop-color="#D82040"/><stop offset="100%" stop-color="#A81828"/></linearGradient>
    <linearGradient id="bodyV" x1="50%" y1="0%" x2="50%" y2="100%"><stop offset="0%" stop-color="rgba(255,255,255,0.1)"/><stop offset="50%" stop-color="rgba(255,255,255,0)"/><stop offset="100%" stop-color="rgba(0,0,0,0.25)"/></linearGradient>
    <linearGradient id="metalH" x1="0%" y1="0%" x2="100%" y2="0%"><stop offset="0%" stop-color="#606078"/><stop offset="15%" stop-color="#B0B0C0"/><stop offset="45%" stop-color="#E0E0E8"/><stop offset="55%" stop-color="#D0D0D8"/><stop offset="85%" stop-color="#B0B0C0"/><stop offset="100%" stop-color="#606078"/></linearGradient>
    <linearGradient id="metalV" x1="50%" y1="0%" x2="50%" y2="100%"><stop offset="0%" stop-color="#D0D0D8"/><stop offset="50%" stop-color="#A0A0B0"/><stop offset="100%" stop-color="#707080"/></linearGradient>
    <radialGradient id="knobG" cx="38%" cy="32%" r="55%"><stop offset="0%" stop-color="#FFE866"/><stop offset="40%" stop-color="#FFD700"/><stop offset="100%" stop-color="#BB8800"/></radialGradient>
    <linearGradient id="fire" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" stop-color="#FFD700"/><stop offset="50%" stop-color="#FF6B35"/><stop offset="100%" stop-color="#FF2D55"/></linearGradient>
    <!-- Chute recess: darker shade of body red -->
    <linearGradient id="chuteDepth" x1="50%" y1="0%" x2="50%" y2="100%">
      <stop offset="0%" stop-color="#6A0C18"/>
      <stop offset="100%" stop-color="#3A0810"/>
    </linearGradient>
    <!-- Chute inner walls (slightly lighter red = reflected body light) -->
    <linearGradient id="chuteWall" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#8C1420"/>
      <stop offset="100%" stop-color="#580C14"/>
    </linearGradient>

    <radialGradient id="cR" cx="36%" cy="30%" r="58%"><stop offset="0%" stop-color="#FF6878"/><stop offset="100%" stop-color="#C81030"/></radialGradient>
    <radialGradient id="cB" cx="36%" cy="30%" r="58%"><stop offset="0%" stop-color="#68AAFF"/><stop offset="100%" stop-color="#2060C0"/></radialGradient>
    <radialGradient id="cY" cx="36%" cy="30%" r="58%"><stop offset="0%" stop-color="#FFE866"/><stop offset="100%" stop-color="#D0A000"/></radialGradient>
    <radialGradient id="cG" cx="36%" cy="30%" r="58%"><stop offset="0%" stop-color="#66DD88"/><stop offset="100%" stop-color="#208840"/></radialGradient>
    <radialGradient id="cP" cx="36%" cy="30%" r="58%"><stop offset="0%" stop-color="#CC88FF"/><stop offset="100%" stop-color="#7030C0"/></radialGradient>
    <radialGradient id="cO" cx="36%" cy="30%" r="58%"><stop offset="0%" stop-color="#FFAA55"/><stop offset="100%" stop-color="#D06010"/></radialGradient>
    <radialGradient id="cPk" cx="36%" cy="30%" r="58%"><stop offset="0%" stop-color="#FF88BB"/><stop offset="100%" stop-color="#D03070"/></radialGradient>
    <radialGradient id="cW" cx="36%" cy="30%" r="58%"><stop offset="0%" stop-color="#F0F0F8"/><stop offset="100%" stop-color="#B0B0C0"/></radialGradient>

    <clipPath id="rr"><rect width="64" height="64" rx="14"/></clipPath>
    <clipPath id="domeClip"><path d="M14.5 31 Q14.5 7 32 7 Q49.5 7 49.5 31 Z"/></clipPath>
  </defs>
  
  <rect width="64" height="64" rx="14" fill="url(#bgR)"/>
  <ellipse cx="32" cy="30" rx="22" ry="20" fill="#FF2D55" filter="url(#ambientGlow)" opacity="0.07"/>

  <!-- FEET -->
  <g filter="url(#metalTex)"><rect x="17" y="53.5" width="30" height="4" rx="1.5" fill="#1E1E30"/></g>
  <rect x="17" y="53.5" width="30" height="1" rx="0.5" fill="rgba(255,255,255,0.05)"/>
  <rect x="18.5" y="56.5" width="5" height="3.5" rx="1.2" fill="#16162A"/>
  <rect x="40.5" y="56.5" width="5" height="3.5" rx="1.2" fill="#16162A"/>

  <!-- BODY -->
  <g filter="url(#paintTex)"><rect x="14" y="32" width="36" height="22" rx="2.5" fill="url(#bodyL)"/></g>
  <rect x="14" y="32" width="36" height="22" rx="2.5" fill="url(#bodyV)"/>
  <rect x="14.5" y="33" width="0.8" height="19" rx="0.4" fill="rgba(255,255,255,0.09)"/>
  <rect x="48.7" y="33" width="0.8" height="19" rx="0.4" fill="rgba(0,0,0,0.2)"/>
  <!-- Panel line -->
  <line x1="16" y1="44.5" x2="48" y2="44.5" stroke="rgba(0,0,0,0.1)" stroke-width="0.3"/>
  <line x1="16" y1="44.8" x2="48" y2="44.8" stroke="rgba(255,255,255,0.04)" stroke-width="0.3"/>

  <!-- === DISPENSER CHUTE (blends with body) === -->
  <!-- Outer bevel: the rounded rim that's still body-colored but slightly raised -->
  <path d="M16.5 46 Q16.5 44.8 18 44.8 L31.5 44.8 Q33 44.8 33 46 L33 52.5 Q33 53.8 31.5 53.8 L18 53.8 Q16.5 53.8 16.5 52.5 Z" fill="#B01828" stroke="rgba(0,0,0,0.15)" stroke-width="0.3"/>
  <!-- Top bevel highlight (light catches the raised edge) -->
  <path d="M18.5 44.8 L31 44.8" fill="none" stroke="rgba(255,255,255,0.12)" stroke-width="0.5" stroke-linecap="round"/>
  <!-- Bottom bevel shadow -->
  <path d="M18.5 53.8 L31 53.8" fill="none" stroke="rgba(0,0,0,0.12)" stroke-width="0.4" stroke-linecap="round"/>
  <!-- Left bevel (light) -->
  <line x1="16.8" y1="46.5" x2="16.8" y2="52" stroke="rgba(255,255,255,0.06)" stroke-width="0.35"/>
  <!-- Right bevel (shadow) -->
  <line x1="32.7" y1="46.5" x2="32.7" y2="52" stroke="rgba(0,0,0,0.08)" stroke-width="0.35"/>

  <!-- Inner recess: the deep hole — dark red, same hue as body but much darker -->
  <path d="M17.5 46.5 Q17.5 45.6 18.8 45.6 L30.7 45.6 Q32 45.6 32 46.5 L32 51.8 Q32 52.8 30.7 52.8 L18.8 52.8 Q17.5 52.8 17.5 51.8 Z" fill="url(#chuteDepth)" filter="url(#insetShadow)"/>
  <!-- Inner top wall shadow (curved back of hole) -->
  <path d="M18.5 46 Q24.5 47.2 31 46" fill="none" stroke="rgba(0,0,0,0.25)" stroke-width="0.5"/>
  <!-- Inner walls: reflected red from body -->
  <line x1="17.8" y1="46.8" x2="17.8" y2="51.5" stroke="url(#chuteWall)" stroke-width="0.5"/>
  <line x1="31.7" y1="46.8" x2="31.7" y2="51.5" stroke="#4A0A10" stroke-width="0.4"/>
  <!-- Inner bottom: faint ramp highlight -->
  <path d="M19 52.2 Q24.5 51.5 30 52.2" fill="none" stroke="rgba(255,255,255,0.025)" stroke-width="0.35"/>

  <!-- Capsule rolling out -->
  <g filter="url(#plasticSheen)">
    <!-- Floor shadow under capsule -->
    <ellipse cx="25" cy="51.8" rx="3.2" ry="0.5" fill="rgba(0,0,0,0.3)"/>
    <g transform="translate(25,49.5) rotate(-8)">
      <circle r="3.2" fill="url(#cO)"/>
      <ellipse rx="3.2" ry="0.4" fill="rgba(0,0,0,0.12)"/>
      <!-- Top curve shine -->
      <path d="M-2,-0.8 Q-1.2,-2.6 0.8,-2.8 Q2.2,-2.3 2.5,-1.3" fill="none" stroke="rgba(255,255,255,0.28)" stroke-width="0.55" stroke-linecap="round"/>
      <!-- Star symbol -->
      <polygon points="0,-1.3 0.45,-0.45 1.3,-0.35 0.65,0.2 0.85,1.05 0,0.58 -0.85,1.05 -0.65,0.2 -1.3,-0.35 -0.45,-0.45" fill="rgba(255,255,255,0.32)"/>
    </g>
  </g>

  <!-- 特撮 printed on body -->
  <text x="25" y="39.8" text-anchor="middle" font-family="'Hiragino Kaku Gothic','Yu Gothic','MS Gothic',sans-serif" font-size="4.8" font-weight="900" fill="rgba(0,0,0,0.35)" dx="0.3" dy="0.3">特撮</text>
  <text x="25" y="39.8" text-anchor="middle" font-family="'Hiragino Kaku Gothic','Yu Gothic','MS Gothic',sans-serif" font-size="4.8" font-weight="900" fill="url(#fire)" filter="url(#glow)" opacity="0.95">特撮</text>

  <!-- COIN SLOT -->
  <g filter="url(#metalTex)"><rect x="37" y="35.5" width="9" height="2.8" rx="1.4" fill="url(#metalH)"/></g>
  <rect x="39.5" y="36.2" width="4" height="1" rx="0.5" fill="#060610"/>
  <rect x="39.5" y="36.2" width="4" height="0.3" rx="0.15" fill="rgba(255,255,255,0.05)"/>

  <!-- KNOB -->
  <circle cx="42" cy="43.5" r="5.2" fill="#222238" filter="url(#metalTex)"/>
  <circle cx="42" cy="43.5" r="5.2" fill="none" stroke="url(#metalV)" stroke-width="0.7"/>
  <circle cx="42" cy="43.5" r="4" fill="none" stroke="rgba(0,0,0,0.15)" stroke-width="0.3"/>
  <g filter="url(#goldSpec)"><circle cx="42" cy="43.5" r="3" fill="url(#knobG)"/></g>
  <circle cx="42" cy="43.5" r="3" fill="none" stroke="#AA8800" stroke-width="0.25"/>
  <line x1="39.8" y1="43.5" x2="44.2" y2="43.5" stroke="rgba(0,0,0,0.28)" stroke-width="0.65" stroke-linecap="round"/>
  <line x1="42" y1="41.3" x2="42" y2="45.7" stroke="rgba(0,0,0,0.28)" stroke-width="0.65" stroke-linecap="round"/>
  <path d="M40.2 41.5 Q41 41 42 40.8" fill="none" stroke="rgba(255,255,255,0.18)" stroke-width="0.35" stroke-linecap="round"/>

  <!-- METAL RIM -->
  <g filter="url(#metalTex)"><rect x="12.5" y="30" width="39" height="3" rx="1.5" fill="url(#metalH)"/></g>
  <rect x="13" y="30" width="38" height="0.5" rx="0.25" fill="rgba(255,255,255,0.15)"/>
  <rect x="13" y="32.3" width="38" height="0.4" rx="0.2" fill="rgba(0,0,0,0.2)"/>
  <!-- Screws -->
  <circle cx="16" cy="31.5" r="1" fill="#808090" stroke="rgba(0,0,0,0.2)" stroke-width="0.25"/>
  <line x1="15.5" y1="31.2" x2="16.5" y2="31.8" stroke="rgba(0,0,0,0.15)" stroke-width="0.3"/>
  <line x1="15.5" y1="31.8" x2="16.5" y2="31.2" stroke="rgba(0,0,0,0.15)" stroke-width="0.3"/>
  <circle cx="48" cy="31.5" r="1" fill="#808090" stroke="rgba(0,0,0,0.2)" stroke-width="0.25"/>
  <line x1="47.5" y1="31.2" x2="48.5" y2="31.8" stroke="rgba(0,0,0,0.15)" stroke-width="0.3"/>
  <line x1="47.5" y1="31.8" x2="48.5" y2="31.2" stroke="rgba(0,0,0,0.15)" stroke-width="0.3"/>

  <!-- GLASS DOME -->
  <g filter="url(#glassFx)">
    <path d="M14.5 31 Q14.5 7 32 7 Q49.5 7 49.5 31 Z" fill="url(#domeG)" stroke="rgba(255,255,255,0.15)" stroke-width="0.7"/>
  </g>

  <!-- ====== CAPSULES ====== -->
  <g clip-path="url(#domeClip)">
    <!-- Bottom pile -->
    <g filter="url(#plasticSheen)">
      <g transform="translate(15.5,29.5) rotate(-22)"><circle r="3.1" fill="url(#cR)"/><ellipse rx="3.1" ry="0.35" fill="rgba(0,0,0,0.1)"/>
        <path d="M-1.6,0 L0,-1.6 L1.6,0" fill="none" stroke="rgba(255,255,255,0.45)" stroke-width="0.45" stroke-linecap="round"/><rect x="-1" y="0.1" width="2" height="0.45" rx="0.2" fill="rgba(255,255,255,0.28)"/></g>
      <g transform="translate(22,28.8) rotate(14)"><circle r="3.3" fill="url(#cB)"/><ellipse rx="3.3" ry="0.38" fill="rgba(0,0,0,0.1)"/>
        <polygon points="0,-1.5 0.5,-0.5 1.5,-0.4 0.7,0.25 0.95,1.2 0,0.65 -0.95,1.2 -0.7,0.25 -1.5,-0.4 -0.5,-0.5" fill="rgba(255,255,255,0.38)"/></g>
      <g transform="translate(28.5,30.2) rotate(-5)"><circle r="3.2" fill="url(#cY)"/><ellipse rx="3.2" ry="0.38" fill="rgba(0,0,0,0.1)"/>
        <circle r="1.2" fill="none" stroke="rgba(255,255,255,0.42)" stroke-width="0.42"/><circle r="0.45" fill="rgba(255,255,255,0.38)"/></g>
      <g transform="translate(35,28.5) rotate(19)"><circle r="3.1" fill="url(#cG)"/><ellipse rx="3.1" ry="0.35" fill="rgba(0,0,0,0.1)"/>
        <text y="0.65" text-anchor="middle" font-size="3" font-weight="900" font-family="Impact,sans-serif" fill="rgba(255,255,255,0.42)">V</text></g>
      <g transform="translate(41.5,30.5) rotate(-16)"><circle r="3" fill="url(#cP)"/><ellipse rx="3" ry="0.35" fill="rgba(0,0,0,0.1)"/>
        <path d="M0.5,-1.4 L-0.25,-0.2 L0.5,-0.2 L-0.5,1.4 L0.25,0.2 L-0.5,0.2Z" fill="rgba(255,255,255,0.38)"/></g>
      <g transform="translate(47.5,28) rotate(25)"><circle r="2.7" fill="url(#cO)"/><ellipse rx="2.7" ry="0.3" fill="rgba(0,0,0,0.1)"/>
        <line x1="-0.9" y1="0" x2="0.9" y2="0" stroke="rgba(255,255,255,0.38)" stroke-width="0.45" stroke-linecap="round"/><line x1="0" y1="-0.9" x2="0" y2="0.9" stroke="rgba(255,255,255,0.38)" stroke-width="0.45" stroke-linecap="round"/></g>
      <g transform="translate(18.5,26) rotate(-8)"><circle r="2.8" fill="url(#cPk)"/><ellipse rx="2.8" ry="0.32" fill="rgba(0,0,0,0.1)"/>
        <path d="M0,-1.2 L0.9,0 L0,1.2 L-0.9,0Z" fill="rgba(255,255,255,0.32)"/></g>
    </g>
    <!-- Second layer -->
    <g opacity="0.85">
      <g transform="translate(16.5,23.5) rotate(11)"><circle r="2.7" fill="url(#cY)"/><ellipse rx="2.7" ry="0.3" fill="rgba(0,0,0,0.08)"/></g>
      <g transform="translate(25,23.5) rotate(-25)"><circle r="2.9" fill="url(#cR)"/><ellipse rx="2.9" ry="0.32" fill="rgba(0,0,0,0.08)"/>
        <path d="M-1.2,-0.7 L0,0.7 L1.2,-0.7" fill="none" stroke="rgba(255,255,255,0.35)" stroke-width="0.35" stroke-linecap="round"/></g>
      <g transform="translate(31.5,24.8) rotate(7)"><circle r="2.6" fill="url(#cW)"/><ellipse rx="2.6" ry="0.28" fill="rgba(0,0,0,0.08)"/>
        <path d="M-0.7,-1 L0,0.2 L0.7,-1" fill="none" stroke="rgba(100,100,120,0.4)" stroke-width="0.35" stroke-linecap="round"/><circle cy="0.2" r="0.6" fill="none" stroke="rgba(100,100,120,0.3)" stroke-width="0.3"/></g>
      <g transform="translate(38.5,24) rotate(-19)"><circle r="2.8" fill="url(#cPk)"/><ellipse rx="2.8" ry="0.3" fill="rgba(0,0,0,0.08)"/></g>
      <g transform="translate(45,24.5) rotate(13)"><circle r="2.5" fill="url(#cB)"/><ellipse rx="2.5" ry="0.28" fill="rgba(0,0,0,0.08)"/></g>
      <g transform="translate(21,21) rotate(-30)"><circle r="2.2" fill="url(#cG)"/><ellipse rx="2.2" ry="0.24" fill="rgba(0,0,0,0.08)"/></g>
      <g transform="translate(42.5,21.5) rotate(22)"><circle r="2.4" fill="url(#cO)"/><ellipse rx="2.4" ry="0.26" fill="rgba(0,0,0,0.08)"/></g>
    </g>
    <!-- Third layer -->
    <g opacity="0.65">
      <g transform="translate(27.5,19.5) rotate(17)"><circle r="2.5" fill="url(#cP)"/><ellipse rx="2.5" ry="0.28" fill="rgba(0,0,0,0.06)"/></g>
      <g transform="translate(35.5,19) rotate(-12)"><circle r="2.4" fill="url(#cR)"/><ellipse rx="2.4" ry="0.26" fill="rgba(0,0,0,0.06)"/></g>
      <g transform="translate(18.5,18) rotate(28)"><circle r="2.2" fill="url(#cB)"/><ellipse rx="2.2" ry="0.24" fill="rgba(0,0,0,0.06)"/></g>
      <g transform="translate(31.5,17.5) rotate(-6)"><circle r="2.1" fill="url(#cY)"/><ellipse rx="2.1" ry="0.22" fill="rgba(0,0,0,0.06)"/></g>
      <g transform="translate(43,18.5) rotate(9)"><circle r="2.1" fill="url(#cG)"/><ellipse rx="2.1" ry="0.22" fill="rgba(0,0,0,0.06)"/></g>
      <g transform="translate(24,16.5) rotate(-21)"><circle r="2" fill="url(#cO)"/><ellipse rx="2" ry="0.22" fill="rgba(0,0,0,0.06)"/></g>
      <g transform="translate(38.5,17) rotate(15)"><circle r="2" fill="url(#cPk)"/><ellipse rx="2" ry="0.22" fill="rgba(0,0,0,0.06)"/></g>
    </g>
    <!-- Top stragglers -->
    <g opacity="0.45">
      <g transform="translate(22.5,13.5) rotate(-35)"><circle r="1.9" fill="url(#cW)"/></g>
      <g transform="translate(33.5,13) rotate(27)"><circle r="2" fill="url(#cR)"/></g>
      <g transform="translate(41,14.5) rotate(-18)"><circle r="1.8" fill="url(#cP)"/></g>
      <g transform="translate(28.5,11) rotate(40)"><circle r="1.7" fill="url(#cB)"/></g>
      <g transform="translate(37,11.5) rotate(-33)"><circle r="1.6" fill="url(#cY)"/></g>
      <g transform="translate(32,9) rotate(15)"><circle r="1.5" fill="url(#cG)"/></g>
    </g>
  </g>

  <!-- Dome reflections -->
