    --glass-bg: rgba(255,255,255,0.72);
    --glass-border: rgba(0,0,0,0.06);
    --shadow: 0 4px 30px rgba(0,0,0,0.06);
    --shadow-sm: 0 1px 4px rgba(0,0,0,0.06);
  }

  /* Light theme overrides */
  [data-theme="light"] body { background: var(--bg-body); color: var(--text-main); }
  [data-theme="light"] .bg-grid { opacity: 0.03; }
  [data-theme="light"] .bg-glow { opacity: 0.04; }
  [data-theme="light"] .theme-toggle,
  [data-theme="light"] .lang-toggle { background: var(--toggle-bg); border-color: var(--toggle-border); }
  [data-theme="light"] .theme-opt { color: rgba(0,0,0,0.4); }
  [data-theme="light"] .theme-opt:hover { color: rgba(0,0,0,0.7); }
  [data-theme="light"] .theme-opt.active { color: #fff; }
  [data-theme="light"] .color-dot { border-color: rgba(0,0,0,0.15); }
  [data-theme="light"] .color-pick { border-left-color: rgba(0,0,0,0.08); }

  [data-theme="light"] .jp-title { color: var(--title-color); text-shadow: none; }
  [data-theme="light"] .kr-subtitle { color: rgba(0,0,0,0.5); }
  [data-theme="light"] .divider { background: linear-gradient(90deg, transparent, rgba(0,0,0,0.15), transparent); }
  [data-theme="light"] .filter-btn { background: var(--card-bg); border-color: var(--card-border); color: rgba(0,0,0,0.5); }
  [data-theme="light"] .filter-btn:hover { border-color: var(--primary); color: rgba(0,0,0,0.7); }
  [data-theme="light"] .filter-btn .count { color: rgba(0,0,0,0.3); }
  [data-theme="light"] .filter-btn.active { color: #fff; }
  [data-theme="light"] .filter-btn.active .count { color: var(--text-main); }
  [data-theme="light"] .reel-container { background: var(--card-bg); border-color: var(--card-border); }
  [data-theme="light"] .card { background: #fff; border-color: rgba(0,0,0,0.08); }
  [data-theme="light"] .card-body { background: #fff; }
  [data-theme="light"] .card-title { color: rgba(0,0,0,0.85); }
  [data-theme="light"] .card-meta { color: rgba(0,0,0,0.45); }
  [data-theme="light"] .card-category { color: rgba(0,0,0,0.4); }
  [data-theme="light"] .ttfc-link { background: rgba(var(--primary-rgb),0.08); color: var(--primary); border-color: rgba(var(--primary-rgb),0.2); }
  [data-theme="light"] .list-toggle-btn { background: var(--card-bg); border-color: var(--card-border); color: rgba(0,0,0,0.5); }
  [data-theme="light"] .list-search { background: var(--input-bg); border-color: var(--input-border); color: rgba(0,0,0,0.8); }
  [data-theme="light"] .list-search::placeholder { color: rgba(0,0,0,0.3); }
  [data-theme="light"] .list-ctrl-btn { background: var(--card-bg); border-color: var(--card-border); color: rgba(0,0,0,0.5); }
  [data-theme="light"] .list-entry { background: rgba(0,0,0,0.015); border-color: rgba(0,0,0,0.06); color: rgba(0,0,0,0.75); }
  [data-theme="light"] .list-entry:hover { background: rgba(var(--primary-rgb),0.04); border-color: rgba(var(--primary-rgb),0.15); }
  [data-theme="light"] .stats-bar { background: var(--card-bg); border-color: var(--card-border); color: rgba(0,0,0,0.5); }
  [data-theme="light"] .stats-bar strong { color: var(--primary); }
  [data-theme="light"] .timeline-toggle { color: rgba(0,0,0,0.4); }
  [data-theme="light"] .tl-item { border-color: rgba(0,0,0,0.06); }
  [data-theme="light"] .tl-num { color: rgba(0,0,0,0.2); }
  [data-theme="light"] .tl-desc { color: rgba(0,0,0,0.7); }
  [data-theme="light"] .norepeat-badge { background: rgba(var(--primary-rgb),0.08); color: var(--primary); border-color: rgba(var(--primary-rgb),0.15); }
  [data-theme="light"] .history-chip { background: rgba(0,0,0,0.03); border-color: rgba(0,0,0,0.08); color: rgba(0,0,0,0.7); }
  [data-theme="light"] .admin-btn { background: rgba(0,0,0,0.04); border-color: rgba(0,0,0,0.1); color: rgba(0,0,0,0.3); }
  /* Light: card internals */
  [data-theme="light"] .card-title-jp { color: rgba(0,0,0,0.35); }
  [data-theme="light"] .card-meta .label { color: rgba(0,0,0,0.3); }
  [data-theme="light"] .card-meta .value { color: rgba(0,0,0,0.6); }
  /* Light: reel & slot */
  [data-theme="light"] .slot-item { color: rgba(0,0,0,0.15); }
  [data-theme="light"] .slot-item.center { color: rgba(0,0,0,0.85); }
  /* Light: list entries */
  [data-theme="light"] .list-entry:hover { background: rgba(var(--primary-rgb),0.04); color: rgba(0,0,0,0.9); }
  [data-theme="light"] .list-entry .num { color: rgba(0,0,0,0.2); }
  [data-theme="light"] .list-entry .year { color: rgba(0,0,0,0.3); }
  [data-theme="light"] .list-entry .ep { color: rgba(0,0,0,0.3); }
  /* Light: list controls */
  [data-theme="light"] .list-ctrl-btn:hover { background: rgba(0,0,0,0.06); color: rgba(0,0,0,0.8); }
  [data-theme="light"] .list-toggle-btn:hover { color: rgba(0,0,0,0.8); }
  /* Light: history popup */
  [data-theme="light"] .history-overlay .history-popup { background: #fff; border-color: rgba(0,0,0,0.1); }
  [data-theme="light"] .history-popup h2 { color: var(--primary); }
  [data-theme="light"] .history-popup .history-close { color: rgba(0,0,0,0.3); }
  [data-theme="light"] .history-popup .history-close:hover { color: rgba(0,0,0,0.7); }
  [data-theme="light"] .history-clear { color: rgba(0,0,0,0.4); }
  [data-theme="light"] .history-chip .chip-time { color: rgba(0,0,0,0.3); }
  /* Light: admin panel */
  [data-theme="light"] .admin-overlay { background: rgba(255,255,255,0.95); }
  [data-theme="light"] .admin-panel { background: #fff; border-color: rgba(0,0,0,0.1); }
  [data-theme="light"] .admin-panel h2 { color: rgba(0,0,0,0.85); }
  [data-theme="light"] .admin-close { color: rgba(0,0,0,0.4); }
  [data-theme="light"] .admin-tab { color: rgba(0,0,0,0.4); }
  [data-theme="light"] .admin-tab.active { background: var(--primary); color: #fff; }
  [data-theme="light"] .admin-search { background: rgba(0,0,0,0.03); border-color: rgba(0,0,0,0.1); color: rgba(0,0,0,0.8); }
  [data-theme="light"] .admin-search::placeholder { color: rgba(0,0,0,0.3); }
  [data-theme="light"] .admin-item { background: rgba(0,0,0,0.02); border-color: rgba(0,0,0,0.06); }
  [data-theme="light"] .ai-name { color: rgba(0,0,0,0.8); }
  [data-theme="light"] .ai-jp { color: rgba(0,0,0,0.4); }
  [data-theme="light"] .ai-year { color: rgba(0,0,0,0.35); }
  [data-theme="light"] .admin-form { background: rgba(0,0,0,0.02); border-color: rgba(0,0,0,0.06); }
  [data-theme="light"] .admin-form h3 { color: var(--primary); }
  [data-theme="light"] .af-field label { color: rgba(0,0,0,0.4); }
  [data-theme="light"] .af-field input, [data-theme="light"] .af-field select { background: rgba(0,0,0,0.03); border-color: rgba(0,0,0,0.1); color: rgba(0,0,0,0.8); }
  [data-theme="light"] .af-field select option { background: #fff; }
  [data-theme="light"] .af-cancel { background: rgba(0,0,0,0.06); color: rgba(0,0,0,0.5); }
  [data-theme="light"] .admin-gh { background: rgba(0,0,0,0.02); border-color: rgba(0,0,0,0.06); }
  [data-theme="light"] .admin-gh h4 { color: rgba(0,0,0,0.5); }
  [data-theme="light"] .gh-row input { background: rgba(0,0,0,0.03); border-color: rgba(0,0,0,0.1); color: rgba(0,0,0,0.8); }
  [data-theme="light"] .admin-status { color: rgba(0,0,0,0.5); }
  /* Light: timeline editor */
  [data-theme="light"] .tl-editor h4 { color: rgba(0,0,0,0.5); }
  [data-theme="light"] .tl-editor h4 span { color: rgba(0,0,0,0.3); }
  [data-theme="light"] .tl-entry { background: rgba(0,0,0,0.02); border-color: rgba(0,0,0,0.06); }
  [data-theme="light"] .tl-entry select { background: rgba(0,0,0,0.04); border-color: rgba(0,0,0,0.1); color: rgba(0,0,0,0.7); }
  [data-theme="light"] .tl-entry select option { background: #fff; }
  [data-theme="light"] .tl-entry input { background: rgba(0,0,0,0.02); border-color: rgba(0,0,0,0.08); color: rgba(0,0,0,0.7); }
  [data-theme="light"] .tl-entry-num { color: rgba(0,0,0,0.2); }
  [data-theme="light"] .tl-add-btn { border-color: rgba(0,0,0,0.1); color: rgba(0,0,0,0.3); }
  [data-theme="light"] .tl-add-btn:hover { border-color: var(--primary); color: var(--primary); }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  /* === THEME TOGGLE === */
  .theme-toggle {
    position: fixed; top: 16px; right: 16px; z-index: 50;
    display: flex; background: var(--glass-bg);
    border: 1px solid var(--glass-border);
    border-radius: 28px; overflow: hidden;
    backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
    box-shadow: var(--shadow-sm);
  }
  .theme-opt {
    padding: 8px 16px;
    font-family: -apple-system, 'Inter', 'Noto Sans KR', sans-serif;
    font-size: 0.72rem; font-weight: 600;
    color: var(--text-sub);
    background: transparent; border: none;
    cursor: pointer; transition: all 0.3s ease;
    display: flex; align-items: center; gap: 5px;
    white-space: nowrap;
  }
  .theme-opt:hover { color: var(--text-main); }
  .theme-opt.active {
    background: var(--primary);
    color: #fff;
    border-radius: 24px;
    box-shadow: 0 2px 12px rgba(var(--primary-rgb),0.35);
  }
  .theme-opt .dot {
    width: 8px; height: 8px; border-radius: 50%;
  }
  .theme-opt[data-t="dark"] .dot { background: #1C1C1E; border: 1px solid rgba(255,255,255,0.2); }
  .theme-opt[data-t="light"] .dot { background: #F5F5F7; border: 1px solid rgba(0,0,0,0.1); }
  .theme-opt.active .dot { background: #fff !important; border-color: #fff !important; }

  /* === COLOR PICKER === */
  .color-pick {
    display: flex; align-items: center; justify-content: center;
    padding: 6px 10px; cursor: pointer; position: relative;
    border-left: 1px solid var(--card-border);
    margin-left: 2px;
  }
  .color-pick input[type="color"] {
    position: absolute; width: 0; height: 0; opacity: 0;
    pointer-events: none;
  }
  .color-dot {
    width: 18px; height: 18px; border-radius: 50%;
    background: var(--primary);
    border: 2px solid rgba(255,255,255,0.2);
    transition: transform 0.2s ease, box-shadow 0.2s ease;
    box-shadow: 0 0 0 0 rgba(var(--primary-rgb),0.3);
  }
  .color-pick:hover .color-dot {
    transform: scale(1.15);
    box-shadow: 0 0 8px rgba(var(--primary-rgb),0.5);
  }

  /* === LANG TOGGLE === */
  .lang-toggle {
    position: fixed; top: 16px; left: 16px; z-index: 50;
    display: flex; background: var(--input-bg);
    border: 1px solid var(--input-border);
    border-radius: 24px; overflow: hidden;
    backdrop-filter: blur(8px);
  }
  .lang-opt {
    padding: 8px 12px;
    font-size: 0.72rem; font-weight: 600;
    color: var(--text-sub);
    background: transparent; border: none;
    cursor: pointer; transition: all 0.3s ease;
    font-family: -apple-system, 'Inter', 'Noto Sans KR', sans-serif;
  }
  .lang-opt:hover { color: var(--text-main); }
  .lang-opt.active {
    background: var(--primary);
    color: #fff;
    border-radius: 20px;
    box-shadow: 0 2px 12px rgba(var(--primary-rgb),0.35);
  }

  body {
    font-family: -apple-system, 'Inter', 'SF Pro Display', 'Noto Sans KR', 'Helvetica Neue', sans-serif;
    background: var(--bg-body);
    color: var(--text-main);
    min-height: 100vh;
    overflow-x: hidden;
    transition: background 0.5s ease, color 0.5s ease;
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
    letter-spacing: -0.01em;
  }

  .bg-grid {
    position: fixed; inset: 0; z-index: 0;
    background-image: none;
    pointer-events: none;
  }

  .bg-glow {
    position: fixed; top: -200px; left: 50%; transform: translateX(-50%);
    width: 800px; height: 800px;
    background: none;
    pointer-events: none; z-index: 0;
  }

  header {
    position: relative; z-index: 1;
    text-align: center;
    padding: 50px 20px 30px;
  }

  header .jp-title {
    font-family: -apple-system, 'Inter', sans-serif;
    font-size: clamp(2rem, 6vw, 3.5rem);
    color: var(--title-color);
    text-shadow: none;
    letter-spacing: -0.02em;
    font-weight: 600;
    margin-bottom: 10px;
  }

  header .kr-subtitle {
    font-size: 0.9rem;
    color: var(--text-sub);
    letter-spacing: -0.02em;
    text-transform: uppercase;
    font-weight: 400;
  }

  .divider {
    width: 40px; height: 3px; margin: 20px auto;
    background: var(--primary);
    border-radius: 2px;
  }

  /* === FILTER === */
  .filter-section {
    position: relative; z-index: 1;
    display: flex; flex-wrap: wrap; justify-content: center; gap: 10px;
    padding: 0 20px 30px;
    max-width: 800px; margin: 0 auto;
  }

  .filter-btn {
    padding: 10px 22px;
    background: var(--card-bg);
    border: 1px solid var(--card-border);
    border-radius: 22px;
    color: var(--text-sub);
    font-family: -apple-system, 'Inter', 'Noto Sans KR', sans-serif;
    font-size: 0.82rem;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.3s ease;
    position: relative;
    overflow: hidden;
    backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);
  }

  .filter-btn::before {
    content: '';
    position: absolute; inset: 0;
    background: var(--primary);
    opacity: 0; transition: opacity 0.3s;
    z-index: -1;
  }

  .filter-btn:hover { border-color: var(--primary); color: var(--text-main); }

  .filter-btn.active {
    border-color: transparent;
    color: #fff;
    box-shadow: 0 2px 8px rgba(var(--primary-rgb),0.25);
  }
  .filter-btn.active::before { opacity: 1; }

  .filter-btn .count {
    display: inline-block; margin-left: 6px;
    font-size: 0.7rem; color: var(--text-sub); font-weight: 400;
  }
  .filter-btn.active .count { color: var(--text-main); }

  /* === SLOT === */
  .slot-container {
    position: relative; z-index: 1;
    max-width: 600px; margin: 0 auto; padding: 0 20px;
  }

  .slot-window {
    position: relative; height: 220px;
    background: var(--card-bg);
    border: 1px solid var(--card-border);
    border-radius: 20px;
    overflow: hidden; margin-bottom: 30px;
    backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
    box-shadow: var(--shadow);
  }

  .slot-window::before, .slot-window::after {
    content: ''; position: absolute; left: 0; right: 0; height: 60px;
    z-index: 2; pointer-events: none;
  }
  .slot-window::before { top: 0; background: linear-gradient(to bottom, var(--bg-body), transparent); }
  .slot-window::after { bottom: 0; background: linear-gradient(to top, var(--bg-body), transparent); }

  .slot-highlight {
    position: absolute; top: 50%; left: 0; right: 0;
    height: 64px; transform: translateY(-50%);
    border-top: 2px solid var(--primary); border-bottom: 2px solid var(--primary);
    background: rgba(var(--primary-rgb),0.05);
    z-index: 1; pointer-events: none;
    box-shadow: inset 0 0 30px rgba(var(--primary-rgb),0.1);
  }

  .slot-reel {
    position: absolute; left: 0; right: 0;
    display: flex; flex-direction: column; align-items: center;
    transition: none;
  }

  .slot-item {
    height: 64px;
    display: flex; align-items: center; justify-content: center;
    font-size: 1.05rem; font-weight: 600;
    color: var(--text-sub);
    white-space: nowrap; padding: 0 20px;
    width: 100%; text-align: center;
  }
  .slot-item.center { color: #fff; font-size: 1.2rem; }

  /* === BUTTONS === */
  .btn-row {
    display: flex; justify-content: center; gap: 14px;
    margin-bottom: 40px; flex-wrap: wrap;
  }

  .spin-btn {
    position: relative;
    width: 200px; height: 50px;
    background: var(--primary);
    border: none; border-radius: 25px;
    color: #fff;
    font-family: -apple-system, 'Inter', sans-serif;
    font-size: 0.9rem; font-weight: 600; letter-spacing: 0.05em;
    cursor: pointer; transition: all 0.3s ease; overflow: hidden;
    box-shadow: 0 2px 10px rgba(var(--primary-rgb),0.25);
  }

  .spin-btn::before {
    content: ''; position: absolute; inset: -2px;
    background: var(--btn-border-glow);
    border-radius: 20px; z-index: -1; opacity: 0; transition: opacity 0.3s;
  }

  .spin-btn:hover { transform: translateY(-2px); box-shadow: 0 8px 30px rgba(var(--primary-rgb),0.4); }
  .spin-btn:hover::before { opacity: 1; }
  .spin-btn:active { transform: translateY(0); }
  .spin-btn.spinning { pointer-events: none; animation: pulse-btn 0.5s ease infinite; }

  .norepeat-row {
    display: flex; align-items: center; justify-content: center; gap: 10px;
    margin-top: -4px; margin-bottom: 8px;
  }
  .norepeat-toggle {
    display: flex; align-items: center; gap: 6px;
    font-size: 0.72rem; color: var(--text-sub);
    cursor: pointer; user-select: none;
  }
  .norepeat-toggle input[type="checkbox"] {
    appearance: none; -webkit-appearance: none;
    width: 32px; height: 18px;
    background: rgba(255,255,255,0.1);
    border-radius: 20px; position: relative;
    cursor: pointer; transition: background 0.3s;
    flex-shrink: 0;
  }
  .norepeat-toggle input[type="checkbox"]::after {
    content: ''; position: absolute;
    top: 2px; left: 2px;
    width: 14px; height: 14px;
    background: rgba(255,255,255,0.4);
    border-radius: 50%; transition: all 0.3s ease;
  }
  .norepeat-toggle input[type="checkbox"]:checked {
    background: var(--primary);
  }
  .norepeat-toggle input[type="checkbox"]:checked::after {
    left: 16px; background: #fff;
  }
  .norepeat-count {
    font-size: 0.65rem; color: var(--text-sub);
    font-family: -apple-system, 'Inter', sans-serif;
  }
  .norepeat-reset {
    background: var(--toggle-bg); border: 1px solid var(--input-border);
    color: var(--text-sub); border-radius: 50%;
    width: 24px; height: 24px; font-size: 0.85rem;
    cursor: pointer; transition: all 0.2s;
    display: flex; align-items: center; justify-content: center;
  }
  .norepeat-reset:hover { background: rgba(var(--primary-rgb),0.2); color: var(--primary); }

  @keyframes pulse-btn {
    0%, 100% { box-shadow: 0 0 20px rgba(var(--primary-rgb),0.3); }
    50% { box-shadow: 0 0 40px rgba(var(--primary-rgb),0.6); }
  }

  .list-toggle-btn {
    height: 50px; padding: 0 24px;
    background: var(--card-bg);
    border: 1px solid var(--card-border);
    border-radius: 25px; color: var(--text-sub);
    font-family: -apple-system, 'Inter', 'Noto Sans KR', sans-serif;
    font-size: 0.85rem; font-weight: 600;
    cursor: pointer; transition: all 0.3s ease;
    display: flex; align-items: center; gap: 8px;
    backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);
  }

  .list-toggle-btn:hover { border-color: var(--primary); color: var(--primary); }
  .list-toggle-btn.active { border-color: var(--primary); color: var(--primary); background: rgba(var(--primary-rgb),0.08); }
  .list-toggle-btn svg { width: 18px; height: 18px; fill: currentColor; }

  /* === LIST PANEL === */
  .list-panel {
    position: relative; z-index: 1;
    max-width: 700px; margin: 0 auto 30px; padding: 0 20px;
    max-height: 0; overflow: hidden;
    transition: max-height 0.5s cubic-bezier(0.4, 0, 0.2, 1);
  }
  .list-panel.open { max-height: 5000px; }

  .list-inner {
    background: var(--card-bg);
    border: 1px solid var(--card-border);
    border-radius: 20px; padding: 24px; margin-bottom: 10px;
  }

  .list-group-title {
    font-size: 0.8rem; font-weight: 600; letter-spacing: 2px;
    padding: 8px 14px; border-radius: 14px; margin-bottom: 10px;
    display: inline-block;
  }

  .list-group-title.sentai { background: rgba(var(--cat-sentai-rgb),0.15); color: var(--cat-sentai); }
  .list-group-title.rider { background: rgba(var(--cat-rider-rgb),0.15); color: var(--cat-rider); }
  .list-group-title.metal { background: rgba(var(--cat-metal-rgb),0.1); color: var(--cat-metal); }
  .list-group-title.project { background: rgba(var(--cat-project-rgb),0.2); color: var(--cat-project); }

  .list-group { margin-bottom: 24px; }
  .list-group:last-child { margin-bottom: 0; }

  .list-items {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
    gap: 4px;
  }

  .list-entry {
    display: flex; align-items: center; gap: 10px;
    padding: 8px 12px; border-radius: 14px;

  .ttfc-link {
    display: inline-flex; align-items: center; gap: 8px;
    margin-top: 18px; padding: 10px 22px;
    background: rgba(var(--primary-rgb),0.1);

    border-radius: 22px;
    color: var(--primary);

    text-decoration: none;
    transition: all 0.3s ease;

    display: flex; align-items: center; gap: 8px;

  .ttfc-mode-toggle {

  .ttfc-mode-toggle input[type="checkbox"]::after {
    content: ''; position: absolute;

  /* === LOGO === */

// === THEME ===
function setTheme(t) {
  if (t !== 'dark' && t !== 'light') t = 'dark';
  document.documentElement.setAttribute('data-theme', t);
  try { localStorage.setItem('toku_theme', t); } catch(e) {}
  document.querySelectorAll('.theme-opt').forEach(b => {
    b.classList.toggle('active', b.dataset.t === t);
  });
  // Re-apply accent for theme
  try {
    const c = localStorage.getItem('toku_accent');
    if (c) setAccent(c, true);
  } catch(e) {}
}

function hexToRgb(hex) {
  const r = parseInt(hex.slice(1,3),16);
  const g = parseInt(hex.slice(3,5),16);
  const b = parseInt(hex.slice(5,7),16);
  return {r,g,b};
}

function lighten(hex, pct) {
  const {r,g,b} = hexToRgb(hex);
  const f = pct/100;
  return `rgb(${Math.round(r+(255-r)*f)},${Math.round(g+(255-g)*f)},${Math.round(b+(255-b)*f)})`;
}

function darken(hex, pct) {
  const {r,g,b} = hexToRgb(hex);
  const f = 1 - pct/100;
  return `rgb(${Math.round(r*f)},${Math.round(g*f)},${Math.round(b*f)})`;
}

function setAccent(hex, noSave) {
  const root = document.documentElement;
  const {r,g,b} = hexToRgb(hex);
  const rgb = `${r},${g},${b}`;

  root.style.setProperty('--primary', hex);
  root.style.setProperty('--primary-rgb', rgb);
  root.style.setProperty('--accent', lighten(hex, 30));
  root.style.setProperty('--btn-gradient', `linear-gradient(135deg, ${hex}, ${darken(hex,15)})`);
  root.style.setProperty('--btn-border-glow', `linear-gradient(135deg, ${hex}, ${lighten(hex,40)}, ${hex})`);
  root.style.setProperty('--card-top-bar', `linear-gradient(90deg, ${hex}, ${lighten(hex,30)}, ${hex})`);
  root.style.setProperty('--glow-color', `rgba(${rgb},0.06)`);
  root.style.setProperty('--cat-rider', hex);
  root.style.setProperty('--cat-rider-rgb', rgb);

  // Update color dot
  const dot = document.getElementById('colorDot');
  if (dot) dot.style.background = hex;
  const picker = document.getElementById('accentPicker');
  if (picker) picker.value = hex;

  if (!noSave) {
    try { localStorage.setItem('toku_accent', hex); } catch(e) {}
  }
}

(function() {
  let saved = 'dark';
  try { saved = localStorage.getItem('toku_theme') || 'dark'; } catch(e) {}
  if (saved !== 'dark' && saved !== 'light') saved = 'dark';
  setTheme(saved);

  // Restore accent color
  try {
    const accent = localStorage.getItem('toku_accent');
    if (accent) setAccent(accent, true);

})();

function t(key) { return I18N[currentLang][key] || I18N.ko[key] || key; }

function getItemName(item) {
  if (currentLang === 'jp') return item.jp;
  if (currentLang === 'en') return item.en || item.name;
  return item.name;
}
function getItemSub(item) {
  if (currentLang === 'jp') return item.name;
  return item.jp;
}

function getCatNames() {
  return {
    sentai: t('catSentai'), rider: t('catRider'),
    metal: t('catMetal'), project: t('catProject')
  };
}

function setLang(lang) {
  currentLang = lang;
  try { localStorage.setItem('toku_lang', lang); } catch(e) {}
  document.querySelectorAll('.lang-opt').forEach(b => {
    b.classList.toggle('active', b.dataset.l === lang);
  });
  applyLang();
}

function applyLang() {
  // Header
  document.querySelector('.kr-subtitle').textContent = t('subtitle');
  // Spin button (only if not spinning)
  if (!spinning) document.getElementById('spinBtn').textContent = t('henshin');
  // List button text
  const listBtn = document.getElementById('listBtn');
  listBtn.lastChild.textContent = ' ' + t('listBtn');
  // Search placeholder
  document.getElementById('listSearch').placeholder = t('searchPlaceholder');
  // TTFC link
  const ttfcEl = document.querySelector('.ttfc-link');
  if (ttfcEl && ttfcEl.lastChild) ttfcEl.lastChild.textContent = ' ' + t('ttfc');
  document.getElementById('ttfcModeLabel').textContent = t('ttfcApp');
  document.getElementById('noRepeatLabel').textContent = t('noRepeat');
  updateNoRepeatUI();
  // History popup
  document.getElementById('historyPopupTitle').textContent = t('historyTitle');
  document.getElementById('historyBtnLabel').textContent = t('historyBtn');
  document.getElementById('historyClearBtn').textContent = t('historyClear');
  // Rebuild filters, stats, list, reel
  rebuildFilters();
  updateStats();
  initReel();
  if (listOpen) renderList();
  // Update history
  renderHistory();
  // Update result card if visible
  const card = document.getElementById('resultCard');
  if (card.classList.contains('show') && window._lastResult) {
    showResult(window._lastResult);
  }
  // Timeline label
  const toggle = document.getElementById('timelineToggle');
  if (toggle) {
    const isOpen = toggle.classList.contains('open');
    document.getElementById('timelineLabel').textContent = isOpen ? t('timelineClose') : t('timelineOpen');
  }
}

  allBtn.innerHTML = `${t('all')}<span class="count">${DATA.filter(d => !checkedShows.has(d.jp)).length}</span>`;
  allBtn.dataset.cat = 'all';
  allBtn.onclick = () => toggleFilter('all');
  container.appendChild(allBtn);

  CAT_ORDER.forEach(key => {
    const available = DATA.filter(d => d.cat === key && !checkedShows.has(d.jp)).length;
    const btn = document.createElement('button');
    btn.className = 'filter-btn' + (activeFilters.has(key) ? ' active' : '');
    btn.innerHTML = `${catNames[key]}<span class="count">${available}</span>`;
    btn.dataset.cat = key;
    btn.onclick = () => toggleFilter(key);
    container.appendChild(btn);
  });
}

const CAT_ORDER = ["sentai", "rider", "metal", "project"];

let activeFilters = new Set(CAT_ORDER);
let historyArr = [];
try { historyArr = JSON.parse(localStorage.getItem('toku_history') || '[]'); } catch(e) { historyArr = []; }
let spinning = false;
let listOpen = false;
let checkedShows;
try { checkedShows = new Set(JSON.parse(localStorage.getItem('toku_checked') || '[]')); }
catch(e) { checkedShows = new Set(); }

function saveChecked() {
  localStorage.setItem('toku_checked', JSON.stringify([...checkedShows]));
}

function getFiltered() {
  return DATA.filter(d => activeFilters.has(d.cat) && !checkedShows.has(d.jp));
}

function getAllFilteredIncludeChecked() {
  return DATA.filter(d => activeFilters.has(d.cat));
}

function initFilters() {
  rebuildFilters();
  updateStats();
}

function updateFilterCounts() {
  rebuildFilters();
}

function toggleFilter(cat) {
  const btns = document.querySelectorAll('.filter-btn');
  if (cat === 'all') {
    if (CAT_ORDER.every(c => activeFilters.has(c))) return;
    activeFilters = new Set(CAT_ORDER);
    btns.forEach(b => b.classList.add('active'));
  } else {
    if (activeFilters.has(cat)) {
      if (activeFilters.size <= 1) return;
      activeFilters.delete(cat);
    } else {
      activeFilters.add(cat);
    }
    btns.forEach(b => {
      if (b.dataset.cat === 'all') b.classList.toggle('active', CAT_ORDER.every(c => activeFilters.has(c)));
      else b.classList.toggle('active', activeFilters.has(b.dataset.cat));
    });
  }
  updateStats();
  initReel();
  if (listOpen) renderList();
}

function updateStats() {
  const total = getAllFilteredIncludeChecked().length;
  const available = getFiltered().length;
  const checked = total - available;
  document.getElementById('statsBar').textContent = checked > 0
    ? t('statsExclude')(total, checked, available)
    : t('statsNormal')(available);
}

// === LIST ===
function toggleList() {
  listOpen = !listOpen;
  document.getElementById('listPanel').classList.toggle('open', listOpen);
  document.getElementById('listBtn').classList.toggle('active', listOpen);
  if (listOpen) renderList();
}

function renderList() {
  const search = document.getElementById('listSearch').value.toLowerCase().trim();
  const allFiltered = getAllFilteredIncludeChecked();
  const searched = search
    ? allFiltered.filter(d => d.name.toLowerCase().includes(search) || d.jp.toLowerCase().includes(search) || (d.en && d.en.toLowerCase().includes(search)))
    : allFiltered;

  const checkedInFilter = allFiltered.filter(d => checkedShows.has(d.jp)).length;
  const availableCount = allFiltered.length - checkedInFilter;
  const catNames = getCatNames();

  document.getElementById('listCountInfo').innerHTML = search
    ? t('searchResult')(searched.length)
    : t('listInfo')(allFiltered.length, checkedInFilter, availableCount);

  let html = '<div class="list-controls">';
  html += `<button class="list-ctrl-btn" onclick="checkAllVisible()">${t('checkAll')}</button>`;
  html += `<button class="list-ctrl-btn danger" onclick="uncheckAllVisible()">${t('uncheckVisible')}</button>`;
  html += `<button class="list-ctrl-btn danger" onclick="uncheckAll()">${t('uncheckAll')} (${checkedShows.size})</button>`;
  html += '</div>';

  CAT_ORDER.forEach(cat => {
    if (!activeFilters.has(cat)) return;
    const items = searched.filter(d => d.cat === cat);
    if (!items.length) return;

    const checkedInCat = items.filter(d => checkedShows.has(d.jp)).length;
    html += `<div class="list-group">`;
    html += `<div class="list-group-title ${cat}">${catNames[cat]} (${items.length - checkedInCat}/${items.length})</div>`;
    html += `<div class="list-items">`;

    const allInCat = DATA.filter(d => d.cat === cat);
    items.forEach((item, itemIdx) => {
      const idx = allInCat.indexOf(item) + 1;
      const isChecked = checkedShows.has(item.jp);
      const dataIdx = DATA.indexOf(item);
      html += `<div class="list-entry${isChecked ? ' checked' : ''}" onclick="toggleCheckIdx(${dataIdx})">
        <div class="check-box"><svg viewBox="0 0 24 24"><path d="M9 16.17L4.83 12l-1.42 1.41L9 19 21 7l-1.41-1.41z"/></svg></div>
        <span class="num">${String(idx).padStart(2, '0')}</span>
        <span>${getItemName(item)}</span>
        <span class="year">${item.year}</span>
      </div>`;
    });

    html += `</div></div>`;
  });

  document.getElementById('listContent').innerHTML = html ||
    `<div style="text-align:center;color:rgba(255,255,255,0.3);padding:20px;">${t('noResult')}</div>`;
}

function toggleCheckIdx(dataIdx) {
  const jp = DATA[dataIdx].jp;
  if (checkedShows.has(jp)) checkedShows.delete(jp);
  else checkedShows.add(jp);
  saveChecked(); updateFilterCounts();
  updateStats();
  initReel();
  renderList();
}

function checkAllVisible() {
  getAllFilteredIncludeChecked().forEach(d => checkedShows.add(d.jp));
  saveChecked(); updateFilterCounts(); updateStats(); initReel(); renderList();
}

function uncheckAllVisible() {
  getAllFilteredIncludeChecked().forEach(d => checkedShows.delete(d.jp));
  saveChecked(); updateFilterCounts(); updateStats(); initReel(); renderList();
}

function uncheckAll() {
  checkedShows.clear();
  saveChecked(); updateFilterCounts(); updateStats(); initReel(); renderList();
}

// === NO REPEAT ===
let noRepeatMode = false;
let pickedShows = new Set();

(function() {
  try {
    noRepeatMode = localStorage.getItem('toku_norepeat') === 'true';
    const saved = localStorage.getItem('toku_picked');
    if (saved) pickedShows = new Set(JSON.parse(saved));
  } catch(e) {}
  const cb = document.getElementById('noRepeatMode');
  if (cb) cb.checked = noRepeatMode;
})();

function toggleNoRepeat() {
  noRepeatMode = document.getElementById('noRepeatMode').checked;
  try { localStorage.setItem('toku_norepeat', noRepeatMode); } catch(e) {}
  updateNoRepeatUI();
  initReel();
}

function updateNoRepeatUI() {
  const countEl = document.getElementById('noRepeatCount');
  const resetBtn = document.getElementById('noRepeatReset');
  if (!noRepeatMode) {
    countEl.textContent = '';
    resetBtn.style.display = 'none';
    return;
  }
  const filtered = getFiltered();
  const remaining = filtered.filter(d => !pickedShows.has(d.jp));
  countEl.textContent = t('noRepeatCount').replace('{p}', pickedShows.size).replace('{t}', filtered.length);
  resetBtn.style.display = pickedShows.size > 0 ? '' : 'none';
}

function resetPicked() {
  pickedShows.clear();
  try { localStorage.setItem('toku_picked', '[]'); } catch(e) {}
  updateNoRepeatUI();
  initReel();
}

function savePicked() {
  try { localStorage.setItem('toku_picked', JSON.stringify([...pickedShows])); } catch(e) {}
}

// === REEL ===
function initReel() {
  const reel = document.getElementById('reel');
  const filtered = getFiltered();
  reel.innerHTML = '';

  // 빈 상태 처리
  if (!filtered.length) {
    const allData = DATA.filter(d => activeFilters.has(d.cat));
    let msg = t('emptyAll');
    if (!allData.length) msg = t('emptyFilter');
    else if (allData.length > 0 && allData.every(d => checkedShows.has(d.jp))) msg = t('emptyChecked');

    const emptyDiv = document.createElement('div');
    emptyDiv.className = 'slot-item center';
    emptyDiv.style.cssText = 'color:rgba(255,255,255,0.25);font-size:0.8rem;font-family:"Noto Sans KR",sans-serif';
    emptyDiv.textContent = msg;
    reel.appendChild(emptyDiv);

    const itemH = window.innerWidth <= 480 ? 52 : 64;
    const windowH = window.innerWidth <= 480 ? 170 : 220;
    reel.style.top = `${(windowH / 2) - (itemH * 0.5)}px`;

    document.getElementById('spinBtn').disabled = true;
    document.getElementById('spinBtn').style.opacity = '0.35';
    return;
  }

  document.getElementById('spinBtn').disabled = false;
  document.getElementById('spinBtn').style.opacity = '';

  const shuffled = [...filtered].sort(() => Math.random() - 0.5);
  const display = shuffled.slice(0, Math.min(5, shuffled.length));
  while (display.length < 5) display.push(filtered[Math.floor(Math.random() * filtered.length)]);

  display.forEach((item, i) => {
    if (!item) return;
    const div = document.createElement('div');
    div.className = `slot-item${i === 2 ? ' center' : ''}`;
    div.textContent = getItemName(item);
    reel.appendChild(div);
  });

  const itemH = window.innerWidth <= 480 ? 52 : 64;
  const windowH = window.innerWidth <= 480 ? 170 : 220;
  reel.style.top = `${(windowH / 2) - (itemH * 2.5)}px`;
}

// === SPIN ===
function spin() {
  if (spinning) return;
  const filtered = getFiltered();
  if (!filtered.length) {
    const btn = document.getElementById('spinBtn');
    btn.textContent = t('emptyAll');
    btn.style.fontSize = '0.7rem';
    setTimeout(() => { btn.textContent = t('henshin'); btn.style.fontSize = ''; }, 2000);
    return;
  }

  // No-repeat: filter out already picked
  let pool = filtered;
  if (noRepeatMode) {
    pool = filtered.filter(d => !pickedShows.has(d.jp));
    if (!pool.length) {
      // All picked — show message
      const btn = document.getElementById('spinBtn');
      btn.textContent = t('noRepeatDone');
      setTimeout(() => { btn.textContent = t('henshin'); }, 2000);
      return;
    }
  }

  spinning = true;
  const btn = document.getElementById('spinBtn');
  const reel = document.getElementById('reel');
  const resultCard = document.getElementById('resultCard');

  btn.classList.add('spinning');
  btn.textContent = '...';
  resultCard.classList.remove('show');

  const itemH = window.innerWidth <= 480 ? 52 : 64;
  const windowH = window.innerWidth <= 480 ? 170 : 220;
  const totalItems = 40 + Math.floor(Math.random() * 20);
  const chosen = pool[Math.floor(Math.random() * pool.length)];

  reel.innerHTML = '';
  const items = [];
  for (let i = 0; i < totalItems; i++) {
    const r = filtered[Math.floor(Math.random() * filtered.length)];
    if (r) items.push(r);
  }
  if (!items.length) { spinning = false; btn.textContent = t('henshin'); return; }
  const chosenIdx = Math.min(totalItems - 5, items.length - 1);
  items[chosenIdx] = chosen;

  items.forEach(item => {
    if (!item) return;
    const div = document.createElement('div');
    div.className = 'slot-item';
    div.textContent = getItemName(item);
    reel.appendChild(div);
  });

  const targetTop = (windowH / 2) - (itemH * chosenIdx) - (itemH / 2);
  reel.style.transition = 'none';
  reel.style.top = `${(windowH / 2) - (itemH * 0.5)}px`;

  requestAnimationFrame(() => {
    requestAnimationFrame(() => {
      reel.style.transition = `top 3s cubic-bezier(0.15, 0.85, 0.35, 1)`;
      reel.style.top = `${targetTop}px`;
    });
  });

  setTimeout(() => {
    const flash = document.getElementById('flash');
    flash.classList.add('active');
    setTimeout(() => flash.classList.remove('active'), 150);

    reel.querySelectorAll('.slot-item').forEach((el, i) => el.classList.toggle('center', i === chosenIdx));

    showResult(chosen);
    addHistory(chosen);

    // No-repeat tracking
    if (noRepeatMode) {
      pickedShows.add(chosen.jp);
      savePicked();
      updateNoRepeatUI();
    }

    spinning = false;
    btn.classList.remove('spinning');
    btn.textContent = t('henshin');
  }, 3200);
}

function showResult(item) {
  window._lastResult = item;
  const card = document.getElementById('resultCard');
  const catNames = getCatNames();
  document.getElementById('cardCategory').className = `card-category ${item.cat}`;
  document.getElementById('cardCategory').textContent = catNames[item.cat];
  document.getElementById('cardTitle').textContent = getItemName(item);
  document.getElementById('cardTitleJp').textContent = getItemSub(item);

  let metaHtml = `<span><span class="label">${t('aired')}</span> ${item.year}</span>`;
  if (item.ep) metaHtml += `<span><span class="label">${t('episodes')}</span> ${item.ep}${t('epUnit')}</span>`;
  document.getElementById('cardMeta').innerHTML = metaHtml;

  // TTFC link — use app protocol or web URL
  const ttfcLink = document.getElementById('ttfcLink');
  const useApp = document.getElementById('ttfcAppMode').checked;
  ttfcLink.target = useApp ? '_self' : '_blank';
  if (item.ttfcId) {
    ttfcLink.href = useApp
      ? `ttfc://show/${item.ttfcId}`
      : `https://pc.tokusatsu-fc.jp/contents?contentId=${item.ttfcId}&contentType=0`;
    ttfcLink.style.display = '';
  } else {
    ttfcLink.href = useApp
      ? `ttfc://search/${encodeURIComponent(item.jp.replace(/[()（）]/g, ' ').trim())}`
      : `https://pc.tokusatsu-fc.jp/search?keyword=${encodeURIComponent(item.jp.replace(/[()（）]/g, ' ').trim())}`;
    ttfcLink.style.display = '';
  }

  generatePoster(item);
  showTimeline(item);
  setTimeout(() => card.classList.add('show'), 50);
}

function getTagLabels() {

// === TTFC APP MODE ===
let ttfcAppMode = false;
(function() {
  try { ttfcAppMode = localStorage.getItem('toku_ttfc_app') === 'true'; } catch(e) {}
  const cb = document.getElementById('ttfcAppMode');
  if (cb) cb.checked = ttfcAppMode;
})();

function toggleTtfcMode() {
  const cb = document.getElementById('ttfcAppMode');
  ttfcAppMode = cb.checked;
  try { localStorage.setItem('toku_ttfc_app', ttfcAppMode); } catch(e) {}
  // Re-apply link if result card is showing
  if (window._lastResult) {
    const item = window._lastResult;
    const ttfcLink = document.getElementById('ttfcLink');
    if (item.ttfcId) {
      ttfcLink.href = ttfcAppMode
        ? `ttfc://show/${item.ttfcId}`
        : `https://pc.tokusatsu-fc.jp/contents?contentId=${item.ttfcId}&contentType=0`;
    } else {
      ttfcLink.href = ttfcAppMode
        ? `ttfc://search/${encodeURIComponent(item.jp.replace(/[()（）]/g, ' ').trim())}`
        : `https://pc.tokusatsu-fc.jp/search?keyword=${encodeURIComponent(item.jp.replace(/[()（）]/g, ' ').trim())}`;
    }
  }
}

function toggleTimeline() {
  const toggle = document.getElementById('timelineToggle');
  const list = document.getElementById('timelineList');
  const isOpen = toggle.classList.toggle('open');
  list.classList.toggle('open', isOpen);
  document.getElementById('timelineLabel').textContent = isOpen ? t('timelineClose') : t('timelineOpen');
}

function showTimeline(item) {
  const section = document.getElementById('timelineSection');
  const list = document.getElementById('timelineList');
  const toggle = document.getElementById('timelineToggle');
  const events = TIMELINE[item.jp];

  if (!events || !events.length) {
    section.style.display = 'none';
    return;
  }

  section.style.display = 'block';
  toggle.classList.remove('open');
  list.classList.remove('open');
  document.getElementById('timelineLabel').textContent = `${t('timelineOpen')} (${events.length})`;

  list.innerHTML = events.map((e, i) =>
    `<div class="tl-item">
      <span class="tl-num">${i + 1}</span>
      <span class="tl-tag ${e.t}">${getTagLabels()[e.t]}</span>
      <span class="tl-desc">${e.d}</span>
    </div>`
  ).join('');
}

// === LOGO DISPLAY ===
function getCatColor(cat) {
  const s = getComputedStyle(document.documentElement);
  const map = {
    sentai: s.getPropertyValue('--cat-sentai').trim(),
    rider: s.getPropertyValue('--cat-rider').trim(),
    metal: s.getPropertyValue('--cat-metal').trim(),
    project: s.getPropertyValue('--cat-project').trim()
  };
  return map[cat] || '#888';
}

function generatePoster(item) {
  const wrap = document.getElementById('posterWrap');
  wrap.style.display = 'flex';
  wrap.innerHTML = '';

  const url = LOGO_IMG[item.jp];
  if (url) {
    const img = document.createElement('img');
    img.className = 'poster-img';
    img.alt = item.name;
    img.referrerPolicy = 'no-referrer';
    img.src = url;
    img.onload = () => img.classList.add('loaded');
    img.onerror = () => { wrap.innerHTML = makeFallback(item); };
    wrap.appendChild(img);
  } else {
    wrap.innerHTML = makeFallback(item);
  }
}

function makeFallback(item) {
  const col = getCatColor(item.cat);
  return `<div style="width:240px;height:160px;border-radius:10px;
    background:linear-gradient(135deg,${col}22,#0a0a14);
    border:1px solid ${col}44;display:flex;align-items:center;justify-content:center;
    flex-direction:column;gap:8px;padding:16px;text-align:center">
    <div style="color:${col};font-size:1.2rem;font-weight:600">${item.jp}</div>
    <div style="color:rgba(255,255,255,0.3);font-size:0.7rem">${item.year}</div>
  </div>`;
}

function addHistory(item) {
  const entry = { name: item.name, en: item.en, jp: item.jp, year: item.year, cat: item.cat, time: Date.now() };
  historyArr.unshift(entry);
  if (historyArr.length > 50) historyArr = historyArr.slice(0, 50);
  try { localStorage.setItem('toku_history', JSON.stringify(historyArr)); } catch(e) {}
  renderHistory();
}

function renderHistory() {
  // 플로팅 버튼 카운트
  document.getElementById('historyBtnCount').textContent = historyArr.length;
  
  // 팝업 카운트
  document.getElementById('historyPopupCount').textContent = `${historyArr.length}/50`;
  
  // 팝업 리스트
  const list = document.getElementById('historyPopupList');
  if (historyArr.length === 0) {
    list.innerHTML = `<div class="hp-empty">${t('historyEmpty')}</div>`;
    return;
  }
  const catNames = {sentai:'전대',rider:'ライダー',metal:'メタル',project:'R.E.D.'};
  list.innerHTML = historyArr.map((h, i) => {
    const name = currentLang === 'jp' ? h.jp : currentLang === 'en' ? (h.en || h.name) : h.name;
    const timeStr = formatTime(h.time);
    return `<div class="hp-item">
      <span class="hp-num">${i + 1}</span>
      <span class="hp-cat">${catNames[h.cat] || h.cat}</span>
      <span class="hp-name">${name}</span>
      <span class="hp-time">${timeStr}</span>
    </div>`;
  }).join('');
}

function formatTime(ts) {
  if (!ts) return '';
  const d = new Date(ts);
  const now = new Date();
  const diff = now - d;
  if (diff < 60000) return '방금';
  if (diff < 3600000) return `${Math.floor(diff / 60000)}분 전`;
  if (diff < 86400000) return `${Math.floor(diff / 3600000)}시간 전`;
  const mm = String(d.getMonth() + 1).padStart(2, '0');
  const dd = String(d.getDate()).padStart(2, '0');
  const hh = String(d.getHours()).padStart(2, '0');
  const mi = String(d.getMinutes()).padStart(2, '0');
  return `${mm}/${dd} ${hh}:${mi}`;
}

//  ADMIN PANEL
// ==========================================
let adminEditIdx = -1; // -1 = new, 0+ = editing index

function openAdmin() {
  document.getElementById('adminOverlay').classList.add('show');
  loadGHSettings();
  renderAdminList();
  document.body.style.overflow = 'hidden';
}
function closeAdmin() {
  document.getElementById('adminOverlay').classList.remove('show');
  document.body.style.overflow = '';
}
function adminTab(tab) {
  document.getElementById('adminTabList').style.display = tab === 'list' ? '' : 'none';
  document.getElementById('adminTabAdd').style.display = tab === 'add' ? '' : 'none';
  document.getElementById('adminTabSettings').style.display = tab === 'settings' ? '' : 'none';
  document.getElementById('adminEditForm').style.display = 'none';
  document.querySelectorAll('.admin-tab').forEach((b,i) => b.classList.toggle('active', ['list','add','settings'][i] === tab));
  if (tab === 'add') showEditForm(-1);
  if (tab === 'list') renderAdminList();
  setAdminStatus('');
}

function renderAdminList() {
  const q = (document.getElementById('adminSearch').value || '').toLowerCase();
  const catNames = {sentai:'전대',rider:'라이더',metal:'메탈',project:'R.E.D.'};
  let html = '';
  DATA.forEach((d,i) => {
    if (q && !d.name.toLowerCase().includes(q) && !d.jp.toLowerCase().includes(q) && !(d.en||'').toLowerCase().includes(q)) return;
    html += `<div class="admin-item">
      <span class="ai-cat">${catNames[d.cat]||d.cat}</span>
      <span class="ai-name">${d.name}</span>
      <span class="ai-jp">${d.jp}</span>
      <span class="ai-year">${d.year}</span>
      <span class="ai-btns">
        <button class="ai-edit" onclick="editEntry(${i})">편집</button>
        <button class="ai-del" onclick="deleteEntry(${i})">삭제</button>
      </span>
    </div>`;
  });
  document.getElementById('adminList').innerHTML = html || '<div style="text-align:center;color:rgba(255,255,255,0.3);padding:20px">검색 결과 없음</div>';
}

function showEditForm(idx) {
  adminEditIdx = idx;
  const d = idx >= 0 ? DATA[idx] : {name:'',en:'',jp:'',year:'',cat:'sentai',ep:null,ttfcId:null};
  const logoUrl = idx >= 0 ? (LOGO_IMG[d.jp] || '') : '';
  const title = idx >= 0 ? `✏️ 편집: ${d.name}` : '➕ 새 작품 추가';
  const formTarget = idx >= 0 ? 'adminEditForm' : 'adminTabAdd';
  
  // 타임라인 데이터
  const tlEvents = (idx >= 0 && TIMELINE[d.jp]) ? TIMELINE[d.jp] : [];
  
  let tlHtml = '';
  tlEvents.forEach((e, i) => {
    tlHtml += buildTLEntryRow(i, e.t, e.d);
  });
  
  document.getElementById(formTarget).style.display = '';
  document.getElementById(formTarget).innerHTML = `
    <div class="admin-form">
      <h3>${title}</h3>
      <div class="af-grid">
        <div class="af-field"><label>한국어 이름 *</label><input id="afName" value="${esc(d.name)}" placeholder="가면라이더 히비키"></div>
        <div class="af-field"><label>영어 이름</label><input id="afEn" value="${esc(d.en||'')}" placeholder="Kamen Rider Hibiki"></div>
        <div class="af-field"><label>일본어 이름 *</label><input id="afJp" value="${esc(d.jp)}" placeholder="仮面ライダー響鬼"></div>
        <div class="af-field"><label>방영 연도 *</label><input id="afYear" value="${esc(d.year)}" placeholder="2005-2006"></div>
        <div class="af-field"><label>카테고리 *</label>
          <select id="afCat">
            <option value="sentai" ${d.cat==='sentai'?'selected':''}>슈퍼 전대</option>
            <option value="rider" ${d.cat==='rider'?'selected':''}>가면라이더</option>
            <option value="metal" ${d.cat==='metal'?'selected':''}>메탈 히어로</option>
            <option value="project" ${d.cat==='project'?'selected':''}>PROJECT R.E.D.</option>
          </select>
        </div>
        <div class="af-field"><label>에피소드 수</label><input id="afEp" type="number" value="${d.ep||''}" placeholder="48"></div>
        <div class="af-field"><label>TTFC ID</label><input id="afTtfc" type="number" value="${d.ttfcId||''}" placeholder="5534"></div>
        <div class="af-field"><label>로고 이미지 URL</label><input id="afLogo" value="${esc(logoUrl)}" placeholder="https://...png"></div>
      </div>
      <div class="tl-editor">
        <h4>📋 시청순서 (타임라인) <span>${tlEvents.length}개 항목</span></h4>
        <div class="tl-entries" id="tlEntries">${tlHtml}</div>
        <button class="tl-add-btn" onclick="addTLEntry()">＋ 항목 추가</button>
      </div>
      <div class="af-btns">
        <button class="af-cancel" onclick="cancelEdit()">취소</button>
        <button class="af-save" onclick="saveEntry()">💾 ${idx >= 0 ? '수정 저장' : '추가'}</button>
      </div>
    </div>`;
}

function buildTLEntryRow(i, type, desc) {
  return `<div class="tl-entry" data-idx="${i}">
    <span class="tl-entry-num">${i + 1}</span>
    <select class="tl-type" onchange="updateTLNum()">
      <option value="ep" ${type==='ep'?'selected':''}>📺 본편</option>
      <option value="movie" ${type==='movie'?'selected':''}>🎬 극장판</option>
      <option value="special" ${type==='special'?'selected':''}>⭐ 스페셜</option>
      <option value="vs" ${type==='vs'?'selected':''}>⚔️ VS</option>
    </select>
    <input class="tl-desc" value="${esc(desc)}" placeholder="설명 (예: 1화 ~ 24화)">
    <button class="tl-entry-del" onclick="removeTLEntry(this)" title="삭제">✕</button>
  </div>`;
}

function addTLEntry() {
  const container = document.getElementById('tlEntries');
  const count = container.querySelectorAll('.tl-entry').length;
  container.insertAdjacentHTML('beforeend', buildTLEntryRow(count, 'ep', ''));
  updateTLNum();
  // 새 항목으로 스크롤 & 포커스
  const last = container.lastElementChild;
  last.scrollIntoView({behavior:'smooth', block:'nearest'});
  last.querySelector('.tl-desc').focus();
}

function removeTLEntry(btn) {
  btn.closest('.tl-entry').remove();
  updateTLNum();
}

function updateTLNum() {
  document.querySelectorAll('#tlEntries .tl-entry').forEach((el, i) => {
    el.querySelector('.tl-entry-num').textContent = i + 1;
  });
  // 카운트 업데이트
  const count = document.querySelectorAll('#tlEntries .tl-entry').length;
  const h4span = document.querySelector('.tl-editor h4 span');
  if (h4span) h4span.textContent = count + '개 항목';
}

function gatherTLData() {
  const entries = [];
  document.querySelectorAll('#tlEntries .tl-entry').forEach(el => {
    const t = el.querySelector('.tl-type').value;
    const d = el.querySelector('.tl-desc').value.trim();
    if (d) entries.push({ t, d });
  });
  return entries;
}
function esc(s) { return String(s).replace(/"/g,'&quot;').replace(/</g,'&lt;'); }

function editEntry(i) {
  adminTab('list');
  document.getElementById('adminEditForm').style.display = '';
  showEditForm(i);
  document.getElementById('adminEditForm').scrollIntoView({behavior:'smooth'});
}

function cancelEdit() {
  document.getElementById('adminEditForm').style.display = 'none';
  document.getElementById('adminTabAdd').style.display = 'none';
  adminEditIdx = -1;
}

function saveEntry() {
  const name = document.getElementById('afName').value.trim();
  const en = document.getElementById('afEn').value.trim();
  const jp = document.getElementById('afJp').value.trim();
  const year = document.getElementById('afYear').value.trim();
  const cat = document.getElementById('afCat').value;
  const ep = document.getElementById('afEp').value ? parseInt(document.getElementById('afEp').value) : null;
  const ttfcId = document.getElementById('afTtfc').value ? parseInt(document.getElementById('afTtfc').value) : null;
  const logo = document.getElementById('afLogo').value.trim();
  const tlData = gatherTLData();
  
  if (!name || !jp || !year) { setAdminStatus('이름, 일본어명, 연도는 필수!', true); return; }
  
  const entry = { name, en: en || undefined, jp, year, cat, ep, ttfcId };
  
  if (adminEditIdx >= 0) {
    const oldJp = DATA[adminEditIdx].jp;
    if (oldJp !== jp) {
      // 로고 키 변경
      if (LOGO_IMG[oldJp]) { LOGO_IMG[jp] = LOGO_IMG[oldJp]; delete LOGO_IMG[oldJp]; }
      // 타임라인 키 변경
      if (TIMELINE[oldJp]) { delete TIMELINE[oldJp]; }
    }
    DATA[adminEditIdx] = entry;
    setAdminStatus(`✅ "${name}" 수정 완료 (Push해야 반영됨)`);
  } else {
    let insertIdx = DATA.length;
    for (let i = DATA.length - 1; i >= 0; i--) {
      if (DATA[i].cat === cat) { insertIdx = i + 1; break; }
    }
    DATA.splice(insertIdx, 0, entry);
    setAdminStatus(`✅ "${name}" 추가 완료 (Push해야 반영됨)`);
  }
  
  if (logo) LOGO_IMG[jp] = logo;
  else if (!logo && LOGO_IMG[jp]) delete LOGO_IMG[jp];
  
  // 타임라인 저장
  if (tlData.length > 0) TIMELINE[jp] = tlData;
  else if (TIMELINE[jp]) delete TIMELINE[jp];
  
  cancelEdit();
  renderAdminList();
  initFilters();
  initReel();
}

function deleteEntry(i) {
  const d = DATA[i];
  if (!confirm(`정말 "${d.name}" (${d.jp})을(를) 삭제하시겠습니까?`)) return;
  if (LOGO_IMG[d.jp]) delete LOGO_IMG[d.jp];
  if (TIMELINE[d.jp]) delete TIMELINE[d.jp];
  DATA.splice(i, 1);
  renderAdminList();
  initFilters();
  initReel();
  setAdminStatus(`🗑️ "${d.name}" 삭제됨 (Push해야 반영됨)`);
}

    document.getElementById('ghRepo').value = s.repo || '';

function saveGHSettings() {
  const s = {
    owner: document.getElementById('ghOwner').value.trim(),
    repo: document.getElementById('ghRepo').value.trim(),
    path: document.getElementById('ghPath').value.trim() || 'index.html',
    token: document.getElementById('ghToken').value.trim()
  };
  localStorage.setItem('toku_gh', JSON.stringify(s));
  setAdminStatus('✅ GitHub 설정 저장됨');
}
function getGH() {
  try { return JSON.parse(localStorage.getItem('toku_gh') || '{}'); } catch(e) { return {}; }
}

// === GitHub Push ===
async function pushToGitHub() {
  const gh = getGH();
  if (!gh.owner || !gh.repo || !gh.token) {
    setAdminStatus('❌ GitHub 설정을 먼저 입력하세요!', true);
    adminTab('settings');
    return;
  }
  
  setAdminStatus('⏳ GitHub에서 현재 파일 가져오는 중...');
  
  try {
    const apiBase = `https://api.github.com/repos/${gh.owner}/${gh.repo}/contents/${gh.path}`;
    const headers = { 'Authorization': `token ${gh.token}`, 'Accept': 'application/vnd.github.v3+json' };
    
    // 1. 현재 파일 가져오기 (sha 필요)
    const getRes = await fetch(apiBase, { headers });
    if (!getRes.ok) throw new Error(`GET 실패: ${getRes.status} ${getRes.statusText}`);
    const fileData = await getRes.json();
    const sha = fileData.sha;
    const currentContent = atob(fileData.content.replace(/\n/g, ''));
    
    setAdminStatus('⏳ 파일 수정 중...');
    
    // 2. DATA 배열 교체
    let newContent = replaceDataInFile(currentContent);
    
    // 3. LOGO_IMG 교체
    newContent = replaceLogoInFile(newContent);
    
    // 4. TIMELINE 교체
    newContent = replaceTimelineInFile(newContent);
    
    setAdminStatus('⏳ GitHub에 Push 중...');
    
    // 4. 커밋
    const putRes = await fetch(apiBase, {
      method: 'PUT',
      headers: { ...headers, 'Content-Type': 'application/json' },
      body: JSON.stringify({
        message: `[Admin] 작품 데이터 업데이트 (${new Date().toLocaleString('ko-KR')})`,
        content: btoa(unescape(encodeURIComponent(newContent))),
        sha: sha
      })
    });
    
    if (!putRes.ok) {
      const err = await putRes.json();
      throw new Error(err.message || `PUT 실패: ${putRes.status}`);
    }
    
    setAdminStatus('✅ Push 완료! Vercel이 자동으로 배포합니다 (1~2분 소요)');
  } catch(e) {
    setAdminStatus(`❌ 오류: ${e.message}`, true);
    console.error('[Admin] Push failed:', e);
  }
}

function replaceDataInFile(content) {
  // DATA 배열 생성
  const catOrder = ['sentai','rider','metal','project'];
  const catComments = {
    sentai: '  // ===== 슈퍼 전대 시리즈 =====',
    rider: '  // ===== 가면라이더 시리즈 =====',
    metal: '  // ===== 메탈 히어로 시리즈 =====',
    project: '  // ===== PROJECT R.E.D. ====='
  };
  
  let lines = ['const DATA = ['];
  catOrder.forEach(cat => {
    const items = DATA.filter(d => d.cat === cat);
    if (items.length === 0) return;
    lines.push(catComments[cat]);
    items.forEach(d => {
      let parts = [`name: ${JSON.stringify(d.name)}`];
      if (d.en) parts.push(`en: ${JSON.stringify(d.en)}`);
      parts.push(`jp: ${JSON.stringify(d.jp)}`);
      parts.push(`year: ${JSON.stringify(d.year)}`);
      parts.push(`cat: ${JSON.stringify(d.cat)}`);
      parts.push(`ep: ${d.ep === null || d.ep === undefined ? 'null' : d.ep}`);
      parts.push(`ttfcId: ${d.ttfcId === null || d.ttfcId === undefined ? 'null' : d.ttfcId}`);
      lines.push(`  { ${parts.join(', ')} },`);
    });
  });
  lines.push('];');
  
  const newData = lines.join('\n');
  
  // 기존 DATA 배열 치환 (const DATA = [ ... ];)
  const dataRegex = /const DATA = \[[\s\S]*?\n\];/;
  if (!dataRegex.test(content)) {
    console.error('[Admin] DATA array not found in file');
    return content;
  }
  return content.replace(dataRegex, newData);
}

function replaceLogoInFile(content) {
  // LOGO_IMG 객체 생성
  let lines = ['const LOGO_IMG = {'];
  const entries = Object.entries(LOGO_IMG);
  entries.forEach(([k, v], i) => {
    const comma = i < entries.length - 1 ? ',' : ',';
    lines.push(`  ${JSON.stringify(k)}: ${JSON.stringify(v)}${comma}`);
  });
  lines.push('};');
  
  const newLogo = lines.join('\n');
  
  const logoRegex = /const LOGO_IMG = \{[\s\S]*?\n\};/;
  if (!logoRegex.test(content)) {
    console.error('[Admin] LOGO_IMG not found in file');
    return content;
  }
  return content.replace(logoRegex, newLogo);
}

function replaceTimelineInFile(content) {
  const newTL = 'const TIMELINE = ' + JSON.stringify(TIMELINE) + ';';
  const tlRegex = /const TIMELINE = \{[\s\S]*?\};/;
  if (!tlRegex.test(content)) {
    console.error('[Admin] TIMELINE not found in file');
    return content;
  }
  return content.replace(tlRegex, newTL);
}

// === Export ===
function exportJSON() {
  const data = { DATA: DATA, LOGO_IMG: LOGO_IMG, TIMELINE: TIMELINE };
  const blob = new Blob([JSON.stringify(data, null, 2)], {type:'application/json'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'tokusatsu-data.json';
  a.click();
  setAdminStatus('✅ JSON 다운로드 완료');
}

  const el = document.getElementById('adminStatus');
  el.textContent = msg;
  el.className = 'admin-status' + (isErr ? ' err' : msg.includes('✅') ? ' ok' : '');
}
